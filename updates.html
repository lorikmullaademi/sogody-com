<style>
/* Hero: darken the photo so the white centered headline/subtitle stay legible
   (matches live). Dark fallback keeps it readable while the Sanity image loads. */
.up-final .banner-work { background-color: #1d1c22; position: relative; }
.up-final .banner-work::before { content: ""; position: absolute; inset: 0; border-radius: 20px; background: linear-gradient(180deg, rgba(20,20,24,0.30), rgba(20,20,24,0.55)); z-index: 0; pointer-events: none; }
.up-final .banner-work > * { position: relative; z-index: 1; }
/* Update cards: rounded image + title below — neutralize Bootstrap card chrome. */
.case-studies .cs-column .card { border: none; background: transparent; }
.case-studies .cs-column .card-body { padding: 0; }
.case-studies .cs-column a { text-decoration: none; }
.case-studies .update-cs-column .both-images { position: relative; border-radius: 24px; overflow: hidden; }
.case-studies .update-cs-column .cs-img { border-radius: 24px; display: block; }
.case-studies .update-cs-column { margin-bottom: 32px; }
.case-studies .update-cs-column .both-images .circular-btn-container { position: absolute; bottom: 15px; right: 15px; }
.case-studies .cs-column .cs-title p { margin-top: 16px; font-size: 18px; color: #2b2b2b; }
